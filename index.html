<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
    <script>
        let nota1 = prompt(parseFloat("Informe a primeira nota"))
        let nota2 = prompt(parseFloat("Informe a segunda nota"))
        let nota3 = prompt(parseFloat("Informe a terceira nota"))
        let media = (nota1 + nota2 + nota3) / 3
        if(media >= 7){
            alert("Passou de ano, media: " + media)
        }else{
            alert("não passou de ano, media: " + media)
        }
    </script>
</body>
</html>
